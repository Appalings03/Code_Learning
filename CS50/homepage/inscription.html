<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <!-- Animation realise with https://animejs.com/ -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
        <link href="styles.css" rel="stylesheet">
        <script src="scripts.js" defer></script>
        <title>Climbing - GO</title>
    </head>

    <body>
        <div class="wrapper">
            <header>
                <div class="logo-container">
                    <img src="rock.png" alt="Logo">
                </div>
                <h1><strong>Climbing - Fontainebleau</strong></h1>
                <nav class="my-2">
                    <a href="index.html" class="btn btn-outline-light btn-sm mx-1">Home</a>
                    <a href="site.html" class="btn btn-outline-light btn-sm mx-1">Site</a>
                    <a href="matos.html" class="btn btn-outline-light btn-sm mx-1">Material</a>
                    <a href="inscription.html" class="btn btn-outline-light btn-sm mx-1">Inscription</a>
                    <a href="contact.html" class="btn btn-outline-light btn-sm mx-1">Contact</a>
                </nav>
            </header>

            <main class="container my-5">
                <section class="mb-5">
                    <h2 class="text-center mb-4">Registration for a climbing trip</h2>
                    <p class="text-center lead mb-4"></p>

                    <div class="row justify-content-center">
                        <div class="col-md-8">
                            <form id="climbform" class="p-4 shadow rounded bg-light">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="firstname" class="form-label">Firstname</label>
                                        <input type="text" class="form-control" id="firstname" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="lastname" class="form-label">Name</label>
                                        <input type="text" class="form-control" id="lastname" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>

                                <div class="mb-3">
                                    <label for="phone" class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone" required>
                                </div>

                                <div class="mb-3">
                                    <label for="date" class="form-label">Trip Date</label>
                                    <input type="date" class="form-control" id="date" required>
                                </div>

                                <div class="mb-3">
                                    <label for="level" class="form-label">Climbing Grade</label>
                                    <select class="form-select" id="level" required>
                                        <option value="">-- Select Climbing Grade --</option>
                                        <option value="3+ to 4+">-- 3+ to 4+ --</option>
                                        <option value="5A- to 5C+">-- 5A- to 5C+ --</option>
                                        <option value="6A- to 6C+">-- 6A- to 6C+ --</option>
                                        <option value="7A- to 7C+">-- 7A- to 7C+ --</option>
                                        <option value="8A or higher">-- Select Climbing Grade --</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Material needed</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="gear1">
                                        <label class="form-check-label for="gear1">Climbing shoes</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="gear2">
                                        <label class="form-check-label for="gear2">Harness</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="gear3">
                                        <label class="form-check-label for="gear3">Crash Pad</label>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="notes" class="form-label">Additional Notes</label>
                                    <textarea class="form-control" id="notes" row="3"></textarea>
                                </div>

                                <button type="submit" class="btn w-100">Submit</button>

                            </form>
                        </div>
                    </div>
                </section>
            </main>

            <footer>
                <p>&copy; Martin - 2025. All rigth Reserved</p>
            </footer>
        </div>

        <script>
            window.onload = function () {
                anime({
                    targets: '#climbform',
                    opacity: [0, 1],
                    transateY: [-30, 0],
                    easing: 'easeOutQuad',
                    duration: 1000
                });

                registration()
            };
        </script>

    </body>

</html>
