{% extends "layout.html" %}

{% block title %}
Change Password
{% endblock %}

{% block main %}
<h2>Change Password</h2>
<form action="/change_pwd" method="post">
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="old" placeholder="Old Password" type="password" required>
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="new" placeholder="New Password" type="password" required>
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="confirm" placeholder="Confirm Password" type="password" required>
    </div>
    <button class="btn btn-warning" type="submit">Confirm</button>
</form>
{% endblock %}
