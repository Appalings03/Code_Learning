{% extends "layout.html" %}

{% block title %}
Add Cash
{% endblock %}

{% block main %}
<h2>Add Cash</h2>
<form action="/add_cash" method="post">
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="amount" placeholder="Amount (EUR)" type="number" min="1" required>
    </div>
    <button class="btn btn-success" type="submit">Add Funds</button>
</form>
{% endblock %}
