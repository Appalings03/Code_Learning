{% extends "layout.html" %}

{% block title %}
    Sell
{% endblock %}

{% block main %}
<h2>Sell Stocks</h2>

{% if symbols %}
<form action="/sell" method="post">
    <div class="mb-3">
        <select class="form-select mx-auto w-auto" name="symbol" required>
            <option disabled selected value="">Select Symbol</option>
            {% for s in symbols %}
            <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="shares" placeholder="Shares" type="number" min="1" required>
    </div>
    <button class="btn btn-primary" type="submit">Sell</button>
</form>
{% else %}
<p>You don't have any shares to sell.</p>
{% endif %}
{% endblock %}
